# Builds and deploys the plugin
# Inspired by https://github.com/rectorphp/rector-src/blob/main/.github/workflows/build_scoped_rector.yaml
name: Deploy the Plugin

on:
  push:
    tags:
      - '*'

env:
  # see https://github.com/composer/composer/issues/9368#issuecomment-718112361
  COMPOSER_ROOT_VERSION: "dev-main"

jobs:
  build_scoped_omni_icon:
    # Don't run on forks.
    if: github.repository == 'nabasa-dev/omni-icon'

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        # Use pnpm to install dependencies and build the assets.
        - uses: actions/setup-node@v4
          with:
            node-version: 22

        - uses: pnpm/action-setup@v4

        - name: Get pnpm store directory
          shell: bash
          run: |
            echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

        - uses: actions/cache@v4
          name: Setup pnpm cache
          with:
            path: ${{ env.STORE_PATH }}
            key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
            restore-keys: |
              ${{ runner.os }}-pnpm-store-

        # install dependencies and build the assets
        - run: pnpm install

        - run: pnpm build

        # Setup PHP for scoping
        - uses: shivammathur/setup-php@v2
          with:
            php-version: 8.2
            coverage: none
          env:
            COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        # Extract changelog content before removing the file (if CHANGELOG.md exists)
        - name: "Extract changelog for version"
          id: changelog
          run: |
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION_NO_V=${VERSION#v}
            if [ -f "CHANGELOG.md" ]; then
              CHANGELOG_CONTENT=$(node deploy/extract-changelog.js "$VERSION_NO_V")
              echo "content<<EOF" >> $GITHUB_OUTPUT
              echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "content=Release $VERSION_NO_V" >> $GITHUB_OUTPUT
            fi

        # clean up the dev files
        - run: rm -rf resources node_modules package.json pnpm-lock.yaml vite.config.js
        - run: rm -rf CLAUDE.md .agents DEVELOPMENT.md
        - run: rm -rf CHANGELOG.md
        - run: rm -rf yaak svg

        # install only prod dependencies
        - run: composer install --no-dev --classmap-authoritative --ansi

        # copy files to deploy directory, excluding nested directories to prevent rsync from copying in a loop
        - run: rsync --exclude omni-icon-deploy -av * omni-icon-deploy --quiet

        # prefix the namespaces
        - run: sh deploy/deploy-scoped.sh omni-icon-deploy omni-icon-prefixed

        # clone remote repository, so we can push it
        - uses: actions/checkout@v4
          with:
            repository: nabasa-dev/omni-icon-deployed
            ref: main
            path: remote-repository
            fetch-depth: 0
            token: ${{ secrets.ORG_DEV_PAT }}

        # remove remote files, to avoid piling up dead code in remote repository
        - working-directory: remote-repository
          run: |
            git rm -rf .
            git clean -fxd

        # copy files to remote repository
        - run: cp -a omni-icon-prefixed/. remote-repository

        # setup git
        - working-directory: remote-repository
          run: |
            git config user.name "Joshua Gugun Siagian"
            git config user.email suabahasa@gmail.com

        # commit metadata
        - name: "Get Git log"
          id: git-log
          run: |
              echo "log<<EOF" >> $GITHUB_OUTPUT
              echo "$(git log ${{ github.event.before }}..${{ github.event.after }} --reverse --pretty='https://github.com/nabasa-dev/omni-icon/commit/%H %s')" >> $GITHUB_OUTPUT
              echo 'EOF' >> $GITHUB_OUTPUT

        # publish it to remote repository with tag
        - name: "Commit Prefixed - tag"
          working-directory: remote-repository
          if: "startsWith(github.ref, 'refs/tags/')"
          env:
              INPUT_LOG: ${{ steps.git-log.outputs.log }}
          run: |
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION_NO_V=${VERSION#v}
            git add --all
            git commit -m "Omni Icon $VERSION_NO_V" -m "$INPUT_LOG"
            git push --quiet origin main
            git tag $VERSION_NO_V -m "$VERSION_NO_V"
            git push --quiet origin $VERSION_NO_V

        # Create GitHub Release with changelog and zip file
        - name: "Create plugin zip file"
          run: |
            mkdir -p omni-icon-zip/omni-icon
            cp -r omni-icon-prefixed/* omni-icon-zip/omni-icon/
            cd omni-icon-zip
            zip -r "../omni-icon-${{ github.ref_name }}.zip" . -x "*.git*" "*.DS_Store*"
            cd ..
            ls -la omni-icon-*.zip

        - name: "Create GitHub Release"
          uses: softprops/action-gh-release@v2
          if: "startsWith(github.ref, 'refs/tags/')"
          with:
            name: "${{ github.ref_name }}"
            body: ${{ steps.changelog.outputs.content }}
            files: |
              omni-icon-${{ github.ref_name }}.zip
            draft: false
            prerelease: false
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
